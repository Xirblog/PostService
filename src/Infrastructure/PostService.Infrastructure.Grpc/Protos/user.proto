syntax = "proto3";

// find a way to sync between client and server

option csharp_namespace = "PostService.Infrastructure.Grpc.Proto";

package user;

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc FindUserById(FindUserByIdRequest) returns (FindUserByIdResponse);
}

message CreateUserRequest {
  string first_name = 1;
  string last_name = 2;
  int64 age = 3;
}

message CreateUserResponse {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 age = 4;
}

message FindUserByIdRequest {
  string user_id = 1;
}

message FindUserByIdResponse {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 age = 4;
}
